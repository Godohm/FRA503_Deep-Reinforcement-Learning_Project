# EURUSD Intraday Trading Environment — base config
#
# All cost units are explicit. See reports/implementation_plan.md §5b for the
# unit table. The five user-mandated corrections are reflected throughout:
#   1. MT5 timestamps are UTC. Convert to Asia/Bangkok ONLY for session masking.
#   2. txn_cost and mtm_pnl are BOTH in account currency (both * unit_size).
#   3. Reward = net_pnl / initial_equity. No opaque 1e4 multiplier.
#   4. Force-close at the last bar never reads a non-existent next bar.
#   5. Spread plays a dual role (feature #6 AND cost input); see §4a.

data:
  raw_csv: data/raw/eurusd_m1_2025_2026.csv
  processed_dir: data/processed
  # MT5 copy_rates_range returns UTC. We parse as UTC and keep UTC as the
  # canonical index. Conversion to UTC+7 happens only for session masking.
  source_tz: "UTC"

session:
  display_tz: "Asia/Bangkok"   # UTC+7 — used for session masking only
  start: "09:00"               # in display_tz; bars at start are INCLUDED
  end:   "00:00"               # in display_tz (next-day midnight UTC+7); EXCLUSIVE
  warmup_bars: 60              # for 60-min return + indicators
  max_missing_bars_per_day: 30 # if a session_day has more missing 1-min bars
                               # than this (after gap-fill), drop the whole day
  max_ffill_gap: 5             # ffill OHLC across runs of NaN with run length
                               # at most this many minutes; longer gaps are
                               # left as NaN and those bars are dropped

costs:
  point_size: 1.0e-5           # 5-digit EURUSD broker
  use_broker_spread: true
  spread_cap_quantile: 0.99    # optional cap to dampen news-time spread spikes; null disables
  commission_price: 0.0        # quote-currency per side per unit_size lot;
                               # env multiplies by unit_size to get account ccy
  # Multiplier on (spread_t * point_size) when computing PER-SIDE transaction
  # cost. The CSV's `spread` column is the FULL broker spread (in points).
  #   spread_cost_factor=1.0 (default) -> charge the full spread on every
  #       position-change side. A 0->long->flat round-trip pays 2 * full spread.
  #       Conservative: matches a "cross the spread on every order" model.
  #   spread_cost_factor=0.5 -> charge half-spread per side; a round-trip pays
  #       exactly one full spread. Closer to mid-priced execution accounting.
  # Real-world convention: broker quotes a bid-ask spread; a market buy hits
  # the ask (pay half-spread) and a market sell hits the bid (pay half-spread),
  # so a round-trip costs exactly ONE full spread. spread_cost_factor=0.5
  # matches this. factor=1.0 double-charges and is only appropriate when
  # modelling worst-case slippage on top of spread.
  spread_cost_factor: 0.5

portfolio:
  initial_equity: 10000.0      # account currency (USD)
  unit_size: 100000.0          # base-ccy notional per unit (1 std lot = 100k EUR)

execution: current_close       # current_close | next_open
                               # Force-close ALWAYS uses current_close regardless.

reward:
  # Default reward = net_pnl / initial_equity (dimensionless fractional return).
  # reward_scaling stays at 1.0 by default; only raise if a specific algorithm
  # needs larger advantage magnitudes. NEVER use to fix a unit mismatch.
  scaling: 1.0
  stop_equity_floor: 0.0       # episode ends if equity falls to/below this

split:
  # 2025-2026 dataset: 12 months train + 2 val + 2 test
  #   train : Jan 2025 -- Dec 2025  (12 months, learn weights)
  #   val   : Jan 2026 -- Feb 2026  ( 2 months, early-stopping / HP selection)
  #   test  : Mar 2026 -- Apr 2026  ( 2 months, final unbiased evaluation)
  # val_months=0 reverts to the old 2-way train/test behaviour.
  train_months: 12
  val_months: 2
  test_months: 2

seed: 42
