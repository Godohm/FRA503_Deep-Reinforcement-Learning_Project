# A2C hyperparameters (via Stable-Baselines3).
#
# Hidden size matches DQN/PPO for fair comparison (128, 128).

network:
  hidden_sizes: [128, 128]

a2c:
  learning_rate: 7.0e-4
  n_steps: 5                       # n-step actor-critic rollout per update
  gamma: 0.99
  gae_lambda: 1.0
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  device: cpu

training:
  total_steps: 200000
  eval_every_steps: 10000
  save_dir_root: models/a2c
  results_dir_root: results/a2c
  smoke_steps: 1000

seed: 42
