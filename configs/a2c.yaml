# A2C — best hyperparameters from Optuna HPO.
#
# 50 trials × 50k steps on 2025 val split.
# Best Sharpe on validation: -2.188 at trial #27.
# See results/optuna/optuna_report.md for the full search analysis.

network:
  hidden_sizes: [128, 128]

a2c:
  learning_rate: 1.4937e-4         # HPO best (log scale)
  n_steps: 30                      # HPO best (n-step rollout)
  gamma: 0.9605                    # HPO best
  gae_lambda: 0.9159               # HPO best
  ent_coef: 1.3823e-4              # HPO best (log scale)
  vf_coef: 0.8213                  # HPO best
  max_grad_norm: 0.5
  device: cpu

training:
  total_steps: 200000
  eval_every_steps: 10000
  save_dir_root: models/a2c
  results_dir_root: results/a2c
  smoke_steps: 1000

seed: 42
