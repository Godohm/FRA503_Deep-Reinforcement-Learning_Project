# Custom Double DQN — LINEAR ε-decay variant.
#
# Best hyperparameters from Optuna HPO (50 trials × 50k steps, 2025 val split).
# Best Sharpe on validation: +2.542 at trial #52.
# See results/optuna/optuna_report.md for the full search analysis.

network:
  hidden_sizes: [128, 128]

dqn:
  lr: 4.7485e-3                    # HPO best (range 1e-5..5e-3)
  gamma: 0.9407                    # HPO best
  batch_size: 64                   # HPO best
  buffer_capacity: 100000
  min_buffer_to_learn: 2000        # HPO best
  target_update_freq: 2000         # HPO best (hard sync, learner steps)
  grad_clip: 10.0
  eps_start: 1.0
  eps_end: 0.05
  eps_decay_steps: 70000           # HPO best
  eps_decay_type: linear           # linear or exponential
  learn_every: 1
  device: cpu

training:
  total_steps: 200000              # full M8 run
  eval_every_steps: 10000          # periodic deterministic eval on val split
  log_every_steps: 1000
  save_dir_root: models/ddqn
  results_dir_root: results/ddqn
  smoke_steps: 1000

seed: 42
